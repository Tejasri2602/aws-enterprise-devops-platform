
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-app
  namespace: enterprise-devops

spec:
  replicas: 2

  selector:
    matchLabels:
      app: enterprise-app

  template:
    metadata:
      labels:
        app: enterprise-app

    spec:
      containers:
      - name: enterprise-app

        image: ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/enterprise-devops-platform:latest

        ports:
        - containerPort: 5000

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "256Mi"
            cpu: "250m"
